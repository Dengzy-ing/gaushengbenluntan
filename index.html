<script>
(function() {
  // ================== 全局变量与初始化 ==================
  const DEFAULT_ADMIN = { username: "admin", pwd: "admin123", role: "admin" };
  const NEW_ADMIN = { username: "root", pwd: "root123", role: "admin" };
  
  // 示例内容数据
  const SAMPLE_CONTENTS = {
    notice: [
      { id: 1001, title: '📢 论坛正式上线公告', content: '<p>瓜升本学习论坛今日正式开放！欢迎各位升本学子加入交流，祝大家一战上岸！</p>', createTime: '2025-03-01 10:00', author: '管理员' },
      { id: 1002, title: '🎉 2025年专升本政策解读', content: '<p>最新专升本政策已发布，请关注各省教育考试院通知，本论坛将持续更新备考资讯。</p>', createTime: '2025-03-05 14:30', author: '管理员' },
      { id: 1003, title: '📚 学习资料更新通知', content: '<p>升学资料共享区已上传最新英语高频词汇和数学公式手册，欢迎下载学习。</p>', createTime: '2025-03-10 09:15', author: '管理员' }
    ],
    answer: [
      { id: 2001, title: '❓ 专升本英语怎么高效背单词？', content: '<p>建议使用艾宾浩斯遗忘曲线规划复习，每天新词50个，配合真题语境记忆。推荐墨墨背单词APP。</p>', createTime: '2025-03-02 16:20', author: '李学长' },
      { id: 2002, title: '❓ 高数基础差，现在开始还来得及吗？', content: '<p>完全来得及！从极限、导数基础概念开始，每天保证3小时练习，推荐汤家凤零基础课程。</p>', createTime: '2025-03-06 11:10', author: '王学姐' },
      { id: 2003, title: '❓ 跨专业升本需要注意什么？', content: '<p>首先要确认目标院校是否接受跨专业，其次提前学习专业课基础知识，最好联系直系学长学姐咨询。</p>', createTime: '2025-03-12 20:45', author: '张学长' }
    ],
    resource: [
      { id: 3001, title: '📖 专升本英语核心词汇3500词', content: '<p>包含音标、释义及例句，PDF可打印版。<br>下载链接：<a href="#">点击下载</a>（提取码：1234）</p>', createTime: '2025-03-03 08:00', author: '资源君' },
      { id: 3002, title: '🧮 高等数学公式大全（完整版）', content: '<p>涵盖极限、导数、积分、微分方程等所有必考公式，高清无水印。<br>下载链接：<a href="#">点击下载</a>（提取码：5678）</p>', createTime: '2025-03-08 13:25', author: '资源君' },
      { id: 3003, title: '📝 近5年专升本真题汇编（含解析）', content: '<p>包含2020-2024年公共课真题及详细解析，刷题必备！<br>下载链接：<a href="#">点击下载</a>（提取码：9012）</p>', createTime: '2025-03-15 19:30', author: '资源君' }
    ],
    news: [
      { id: 4001, title: '🔥 2025年各省专升本报名时间汇总', content: '<p>河南：11月1日-5日；山东：12月10日-15日；广东：1月5日-10日……持续更新中。</p>', createTime: '2025-03-04 09:00', author: '资讯小助手' },
      { id: 4002, title: '📌 专升本考试科目及分值分布', content: '<p>公共课：英语(100分)、高数/语文(100分)；专业课：根据报考专业而定，一般150分。</p>', createTime: '2025-03-09 15:40', author: '资讯小助手' },
      { id: 4003, title: '🏫 2025年专升本招生院校名单（部分）', content: '<p>已公布招生计划的院校：XX大学、XX师范大学、XX理工大学……详情请查看各校官网。</p>', createTime: '2025-03-14 12:00', author: '资讯小助手' }
    ]
  };
  const SAMPLE_POSTS = [
    { id: 5001, user: '升本小萌新', content: '刚开始准备专升本，有点迷茫，有没有一起打卡监督的小伙伴呀？', time: '2025-03-01 08:30', comments: [{ user: '奋斗ing', content: '一起加油！每天来论坛打卡！' }, { user: '李学长', content: '建议先制定一个复习计划，按部就班。' }] },
    { id: 5002, user: '英语困难户', content: '英语阅读总是错很多，求大佬分享阅读技巧！', time: '2025-03-02 14:15', comments: [{ user: '王学姐', content: '先读题干再定位原文，注意同义替换。' }] },
    { id: 5003, user: '数学小王子', content: '分享一个高数易错点：极限计算时注意左右极限是否相等。', time: '2025-03-03 21:20', comments: [{ user: '感谢大神', content: '太有用了！已收藏。' }] }
  ];
  const SAMPLE_CAROUSEL_IMAGES = [
    'https://picsum.photos/id/1043/1920/1080',
    'https://picsum.photos/id/20/1920/1080',
    'https://picsum.photos/id/26/1920/1080'
  ];

  let currentUser = null;
  window.users = [];
  window.contents = { notice: [], answer: [], resource: [], news: [] };
  window.carouselConfig = { images: [], interval: 5 };
  window.posts = [];
  window.carouselTimer = null;
  window.currentSlideIndex = 0;

  // 初始化数据（融合本地存储与示例）
  function initData() {
    // 用户
    let storedUsers = JSON.parse(localStorage.getItem('users')) || [];
    if (!storedUsers.some(u => u.username === DEFAULT_ADMIN.username)) storedUsers.push(DEFAULT_ADMIN);
    if (!storedUsers.some(u => u.username === NEW_ADMIN.username)) storedUsers.push(NEW_ADMIN);
    localStorage.setItem('users', JSON.stringify(storedUsers));
    window.users = storedUsers;

    // 内容
    let storedContents = JSON.parse(localStorage.getItem('contents')) || {};
    ['notice', 'answer', 'resource', 'news'].forEach(type => {
      if (storedContents[type] && storedContents[type].length > 0) {
        window.contents[type] = storedContents[type];
      } else {
        window.contents[type] = SAMPLE_CONTENTS[type] || [];
      }
    });
    localStorage.setItem('contents', JSON.stringify(window.contents));

    // 轮播
    let storedCarousel = JSON.parse(localStorage.getItem('carouselConfig'));
    if (!storedCarousel || !storedCarousel.images || storedCarousel.images.length === 0) {
      storedCarousel = { images: SAMPLE_CAROUSEL_IMAGES, interval: 5 };
    }
    window.carouselConfig = storedCarousel;
    localStorage.setItem('carouselConfig', JSON.stringify(storedCarousel));

    // 帖子
    let storedPosts = JSON.parse(localStorage.getItem('posts'));
    if (!storedPosts || storedPosts.length === 0) {
      storedPosts = SAMPLE_POSTS;
    }
    window.posts = storedPosts;
    localStorage.setItem('posts', JSON.stringify(storedPosts));
  }

  // ================== UI 更新与渲染 ==================
  function updateDateInfo() {
    const now = new Date();
    const year = now.getFullYear(), month = now.getMonth() + 1, day = now.getDate();
    const weekArr = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    document.getElementById('date-info').innerText = `欢迎来到 瓜升本学习论坛！ 今天是：${year}年${month}月${day}日 ${weekArr[now.getDay()]}`;
  }

  function renderContentList(type) {
    const el = document.getElementById(`${type}-list`);
    if (!el) return;
    const list = window.contents[type] || [];
    let html = '';
    list.forEach(item => {
      html += `<div class="post-item" onclick="showContentDetail('${type}',${item.id})"><h3>${item.title}</h3><div class="post-info"><span>${item.createTime || ''}</span><span>${item.author || '管理员'}</span></div></div>`;
    });
    el.innerHTML = html || '<div style="color:#999;padding:10px;">暂无内容</div>';
  }

  function renderPosts() {
    const el = document.getElementById('post-list');
    if (!el) return;
    let html = '';
    window.posts.forEach(p => {
      html += `<div class="post-item"><h3>${p.user}</h3><p>${p.content}</p><div class="post-info"><span>${p.time || ''}</span><span onclick="addComment(${p.id})">评论</span></div><div class="comment-box" id="c-${p.id}">${(p.comments || []).map(cc => `<p>${cc.user}：${cc.content}</p>`).join('')}</div></div>`;
    });
    el.innerHTML = html || '<div style="color:#999;padding:10px;">暂无帖子</div>';
  }

  function initCarousel() {
    const slidesContainer = document.getElementById('hero-slides');
    slidesContainer.innerHTML = '';
    const images = window.carouselConfig.images;
    if (!images || images.length === 0) {
      const slide = document.createElement('div'); slide.className = 'hero-slide active'; slide.style.backgroundColor = '#000'; slidesContainer.appendChild(slide);
      return;
    }
    images.forEach((src, i) => {
      const slide = document.createElement('div');
      slide.className = `hero-slide ${i === 0 ? 'active' : ''}`;
      slide.style.backgroundImage = `url('${src}')`;
      slidesContainer.appendChild(slide);
    });
    startCarousel();
  }

  function startCarousel() {
    if (window.carouselTimer) clearInterval(window.carouselTimer);
    const slides = document.querySelectorAll('.hero-slide');
    if (slides.length <= 1) return;
    window.carouselTimer = setInterval(() => {
      slides[window.currentSlideIndex].classList.remove('active');
      window.currentSlideIndex = (window.currentSlideIndex + 1) % slides.length;
      slides[window.currentSlideIndex].classList.add('active');
    }, window.carouselConfig.interval * 1000);
  }

  function updateTopBarAuthUI(isLoggedIn) {
    document.querySelectorAll('.right-links a').forEach(link => {
      const txt = link.innerText.trim();
      if (txt === '登录' || txt === '注册') link.style.display = isLoggedIn ? 'none' : 'inline';
      else if (txt === '退出登录') link.style.display = isLoggedIn ? 'inline' : 'none';
    });
  }

  // ================== 全局交互函数 ==================
  window.openLoginModal = () => document.getElementById('login-modal').style.display = 'flex';
  window.openRegModal = () => document.getElementById('reg-modal').style.display = 'flex';
  window.closeModal = () => {
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    document.getElementById('wordToolbar').style.display = 'none';
    document.getElementById('detail-modal').classList.remove('fullscreen');
  };
  window.toggleFullscreen = () => {
    const modal = document.getElementById('detail-modal');
    modal.classList.toggle('fullscreen');
    document.getElementById('toggle-fullscreen-btn').innerText = modal.classList.contains('fullscreen') ? '窗口' : '全屏';
  };

  // 富文本功能
  window.doBold = () => {
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const content = range.extractContents();
    const strong = document.createElement('strong');
    strong.appendChild(content);
    range.insertNode(strong);
    sel.removeAllRanges();
    document.getElementById('wordToolbar').style.display = 'none';
  };
  window.doUnderline = () => {
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const content = range.extractContents();
    const u = document.createElement('u');
    u.appendChild(content);
    range.insertNode(u);
    sel.removeAllRanges();
    document.getElementById('wordToolbar').style.display = 'none';
  };
  window.setFontSize = (size) => {
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const content = range.extractContents();
    const span = document.createElement('span');
    span.style.fontSize = size + 'px';
    span.appendChild(content);
    range.insertNode(span);
    sel.removeAllRanges();
    document.getElementById('wordToolbar').style.display = 'none';
  };
  window.pickImage = () => {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = document.createElement('img');
        img.src = ev.target.result;
        img.style.maxWidth = '100%';
        img.style.cursor = 'se-resize';
        img.onmousedown = function(ev) {
          ev.preventDefault();
          const startW = this.offsetWidth, startX = ev.clientX;
          const onMove = e => { this.style.width = Math.max(50, startW + e.clientX - startX) + 'px'; };
          const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        };
        document.getElementById('editor-content').appendChild(img);
      };
      reader.readAsDataURL(file);
    };
    inp.click();
  };

  window.showContentDetail = (type, id) => {
    const item = (window.contents[type] || []).find(i => i.id == id);
    if (!item) return;
    document.getElementById('detail-title').innerText = item.title;
    document.getElementById('detail-content').innerHTML = item.content;
    const modal = document.getElementById('detail-modal');
    modal.classList.remove('fullscreen');
    document.getElementById('toggle-fullscreen-btn').innerText = '全屏';
    modal.style.display = 'flex';
  };

  // ================== 管理员功能 ==================
  window.openAdmin = () => {
    if (!currentUser || currentUser.role !== 'admin') return alert('仅管理员可进入');
    document.querySelector('.admin-box').style.display = 'block';
    document.getElementById('admin').scrollIntoView({ behavior: 'smooth' });
  };

  window.showUserList = () => {
    let html = '<tr><th>用户名</th><th>权限</th></tr>';
    window.users.forEach(u => { html += `<tr><td>${u.username}</td><td>${u.role}</td></tr>`; });
    document.getElementById('admin-table').innerHTML = html;
  };

  window.showPostList = () => {
    let html = '<tr><th>用户</th><th>内容</th><th>操作</th></tr>';
    window.posts.forEach(p => {
      html += `<tr><td>${p.user}</td><td>${(p.content || '').slice(0,20)}...</td><td><button class="btn btn-danger" onclick="delPost(${p.id})">删除</button></td></tr>`;
    });
    document.getElementById('admin-table').innerHTML = html || '<tr><td colspan="3">暂无帖子</td></tr>';
  };

  window.manageContent = (type) => {
    let html = `<tr><th>ID</th><th>标题</th><th>作者</th><th>时间</th><th>操作</th></tr>`;
    const list = window.contents[type] || [];
    list.forEach(item => {
      html += `<tr><td>${item.id}</td><td>${item.title}</td><td>${item.author || '管理员'}</td><td>${item.createTime || ''}</td><td class="op-btn-group"><button class="btn btn-edit" onclick="editContent('${type}',${item.id})">编辑</button><button class="btn btn-danger" onclick="delContent('${type}',${item.id})">删除</button></td></tr>`;
    });
    document.getElementById('admin-table').innerHTML = html || `<tr><td colspan="5">暂无数据</td></tr>`;
  };

  window.openEditModal = (type, id = '') => {
    document.getElementById('edit-type').value = type;
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-title-text').innerText = id ? '编辑内容' : '新增内容';
    if (id) {
      const item = (window.contents[type] || []).find(i => i.id == id);
      if (item) {
        document.getElementById('edit-content-title').value = item.title;
        document.getElementById('editor-content').innerHTML = item.content;
      }
    } else {
      document.getElementById('edit-content-title').value = '';
      document.getElementById('editor-content').innerHTML = '';
    }
    document.getElementById('edit-modal').style.display = 'flex';
  };

  window.editContent = (type, id) => openEditModal(type, id);

  window.delContent = (type, id) => {
    if (!confirm('确定删除？')) return;
    window.contents[type] = (window.contents[type] || []).filter(i => i.id != id);
    localStorage.setItem('contents', JSON.stringify(window.contents));
    renderContentList(type);
    manageContent(type);
  };

  function saveContent() {
    const type = document.getElementById('edit-type').value;
    const id = document.getElementById('edit-id').value;
    const title = document.getElementById('edit-content-title').value;
    const content = document.getElementById('editor-content').innerHTML;
    if (!title || !content) return alert('标题和内容不能为空');
    
    const item = {
      id: id || Date.now(),
      title, content,
      createTime: new Date().toLocaleString(),
      author: currentUser?.username || 'admin'
    };
    const list = window.contents[type] || [];
    if (id) {
      window.contents[type] = list.map(i => i.id == id ? item : i);
    } else {
      list.unshift(item);
      window.contents[type] = list;
    }
    localStorage.setItem('contents', JSON.stringify(window.contents));
    alert('保存成功！');
    closeModal();
    renderContentList(type);
    if (document.querySelector('.admin-box').style.display === 'block') manageContent(type);
  }

  // 轮播管理
  window.openCarouselModal = () => {
    renderCarouselList();
    document.getElementById('carousel-modal').style.display = 'flex';
  };
  function renderCarouselList() {
    const listEl = document.getElementById('carousel-list');
    let html = '';
    window.carouselConfig.images.forEach((img, idx) => {
      html += `<div style="display:flex;align-items:center;gap:10px;margin:5px 0;"><img src="${img}" style="width:100px;height:60px;object-fit:cover;"><button class="btn btn-danger" onclick="delCarouselImage(${idx})">删除</button></div>`;
    });
    listEl.innerHTML = html || '<p>暂无轮播图片，将使用默认黑色背景</p>';
    document.getElementById('carousel-interval').value = window.carouselConfig.interval;
  }
  window.addCarouselImage = () => {
    const input = document.getElementById('carousel-image-input');
    if (!input.files || !input.files[0]) return alert('请选择图片');
    const reader = new FileReader();
    reader.onload = e => {
      window.carouselConfig.images.push(e.target.result);
      renderCarouselList();
    };
    reader.readAsDataURL(input.files[0]);
  };
  window.delCarouselImage = (idx) => {
    window.carouselConfig.images.splice(idx, 1);
    renderCarouselList();
  };
  window.saveCarouselSetting = () => {
    const interval = parseInt(document.getElementById('carousel-interval').value);
    if (isNaN(interval) || interval < 1 || interval > 60) return alert('请输入1-60之间的数字');
    window.carouselConfig.interval = interval;
    localStorage.setItem('carouselConfig', JSON.stringify(window.carouselConfig));
    alert('保存成功！');
    initCarousel();
    closeModal();
  };

  // 评论与删除帖子
  window.addComment = (pid) => {
    if (!currentUser) return alert('请登录');
    const c = prompt('输入评论');
    if (!c) return;
    const p = window.posts.find(x => x.id === pid);
    if (!p.comments) p.comments = [];
    p.comments.push({ user: currentUser.username, content: c });
    localStorage.setItem('posts', JSON.stringify(window.posts));
    renderPosts();
  };
  window.delPost = (id) => {
    if (!confirm('确定删除该帖子？')) return;
    window.posts = window.posts.filter(x => x.id !== id);
    localStorage.setItem('posts', JSON.stringify(window.posts));
    showPostList();
    renderPosts();
  };

  // 退出登录
  window.logout = () => {
    if (!confirm('确定要退出登录吗？')) return;
    currentUser = null;
    document.getElementById('user-name').style.display = 'none';
    document.getElementById('login-btn').style.display = 'inline';
    document.getElementById('reg-btn').style.display = 'inline';
    document.getElementById('logout-btn').style.display = 'none';
    document.getElementById('top-logout').style.display = 'none';
    document.querySelector('.admin-box').style.display = 'none';
    updateTopBarAuthUI(false);
    alert('已退出登录');
  };

  // ================== DOMContentLoaded ==================
  document.addEventListener('DOMContentLoaded', () => {
    initData();
    updateDateInfo();
    renderPosts();
    renderContentList('notice');
    renderContentList('answer');
    renderContentList('resource');
    renderContentList('news');
    initCarousel();
    setInterval(updateDateInfo, 60000);

    // 登录
    document.getElementById('login-submit').onclick = () => {
      const u = document.getElementById('login-user').value, p = document.getElementById('login-pwd').value;
      const user = window.users.find(x => x.username === u && x.pwd === p);
      if (!user) return alert('账号或密码错误');
      currentUser = user;
      document.getElementById('user-name').innerText = `欢迎，${u} ${user.role === 'admin' ? '[管理员]' : ''}`;
      document.getElementById('user-name').style.display = 'inline';
      document.getElementById('login-btn').style.display = 'none';
      document.getElementById('reg-btn').style.display = 'none';
      document.getElementById('logout-btn').style.display = 'inline';
      document.getElementById('top-logout').style.display = 'inline';
      updateTopBarAuthUI(true);
      alert('登录成功！');
      closeModal();
      renderPosts();
    };

    // 注册
    document.getElementById('reg-submit').onclick = () => {
      const u = document.getElementById('reg-user').value, p = document.getElementById('reg-pwd').value;
      if (!u || !p) return alert('请填写完整');
      if (window.users.some(x => x.username === u)) return alert('用户名已存在');
      window.users.push({ username: u, pwd: p, role: 'user' });
      localStorage.setItem('users', JSON.stringify(window.users));
      alert('注册成功');
      closeModal();
    };

    // 发帖
    document.getElementById('send-post').onclick = () => {
      if (!currentUser) return alert('请登录');
      const c = document.getElementById('post-content').value;
      if (!c) return alert('请输入内容');
      window.posts.unshift({ id: Date.now(), user: currentUser.username, content: c, time: new Date().toLocaleString(), comments: [] });
      localStorage.setItem('posts', JSON.stringify(window.posts));
      document.getElementById('post-content').value = '';
      renderPosts();
    };

    // 打卡
    document.getElementById('clock-btn').onclick = () => {
      if (!currentUser) return alert('请登录');
      document.getElementById('clock-tip').innerText = '打卡成功';
      document.getElementById('clock-btn').disabled = true;
    };

    // 保存内容
    document.getElementById('save-content').onclick = saveContent;

    // 富文本工具栏
    const editor = document.getElementById('editor-content');
    const toolbar = document.getElementById('wordToolbar');
    editor.addEventListener('mouseup', () => {
      const sel = window.getSelection();
      if (sel.toString().trim().length > 0) {
        const rect = sel.getRangeAt(0).getBoundingClientRect();
        toolbar.style.display = 'flex';
        toolbar.style.left = rect.left + 'px';
        toolbar.style.top = (rect.top - 40) + 'px';
      } else toolbar.style.display = 'none';
    });
    document.addEventListener('click', (e) => { if (!editor.contains(e.target) && !toolbar.contains(e.target)) toolbar.style.display = 'none'; });

    // 导航滚动
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('nav');
      nav.style.display = window.scrollY > document.querySelector('.hero-section').offsetHeight - 100 ? 'block' : 'none';
    });

    document.querySelectorAll('a[data-target]').forEach(link => {
      link.onclick = (e) => {
        e.preventDefault();
        document.getElementById(link.getAttribute('data-target'))?.scrollIntoView({ behavior: 'smooth' });
      };
    });

    updateTopBarAuthUI(false);
  });
})();
</script>
</body>
</html>
